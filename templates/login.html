<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Narrix AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #8B6F47 0%, #D97634 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .login-container { width: 100%; max-width: 400px; padding: 40px; background: white; border-radius: 10px; box-shadow: 0 10px 40px rgba(0,0,0,0.2); }
        h1 { color: #8B6F47; margin-bottom: 30px; text-align: center; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: bold; }
        input { width: 100%; padding: 12px; border: 2px solid #E8D5C4; border-radius: 5px; font-size: 1em; background: #FEFCF9; }
        input:focus { outline: none; border-color: #D97634; box-shadow: 0 0 5px rgba(217, 118, 52, 0.3); }
        .btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #8B6F47 0%, #D97634 100%); color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 1em; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(217, 118, 52, 0.3); }
        .message { text-align: center; margin-top: 20px; font-size: 0.9em; }
        .message a { color: #D97634; text-decoration: none; font-weight: bold; }
        .message a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <h1>🎓 Narrix AI</h1>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" class="btn">Login / Sign Up</button>
        </form>
        <div class="message">
            <p>Ready to write amazing essays? <a href="/app">Try Demo</a></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            const response = await fetch('/login-api', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (response.ok) {
                localStorage.setItem('email', email);
                window.location.href = '/app';
            } else {
                alert('Login failed!');
            }
        });
    </script>
</body>
</html>
